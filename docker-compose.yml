version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: budget_tracker_db
    environment:
      POSTGRES_USER: ${DB_USER:-budgetuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budgetpass}
      POSTGRES_DB: ${DB_NAME:-budget_tracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-budgetuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
